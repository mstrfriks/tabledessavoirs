<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Table des Savoirs — Classement</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:         #C8110A;
      --red-dark:    #6B0500;
      --red-glow:    rgba(200,17,10,.5);
      --red-bg:      rgba(200,17,10,.08);
      --red-border:  rgba(200,17,10,.35);
      --gold:        #D4A017;
      --gold-light:  #FFD040;
      --gold-glow:   rgba(212,160,23,.45);
      --gold-bg:     rgba(212,160,23,.08);
      --gold-border: rgba(212,160,23,.35);
      --bg:          #040003;
      --bg-card:     #09000A;
      --bg-raised:   #110010;
      --bg-hover:    rgba(200,17,10,.06);
      --text:        #DDD0BC;
      --text-muted:  #6A5040;
      --border:      #280008;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Rajdhani', sans-serif;
      color: var(--text); min-height: 100vh; overflow-x: hidden;
      background:
        radial-gradient(ellipse 160% 55% at 50% 108%, rgba(180,8,0,.55) 0%, rgba(90,0,0,.25) 38%, transparent 58%),
        radial-gradient(ellipse 55% 90% at -4%  55%, rgba(120,0,30,.3)  0%, transparent 55%),
        radial-gradient(ellipse 55% 90% at 104% 55%, rgba(120,0,30,.3)  0%, transparent 55%),
        radial-gradient(ellipse 90% 55% at 50%  -5%, rgba(12,0,22,.8)   0%, transparent 60%),
        #040003;
    }

    /* Scanlines */
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.10) 3px, rgba(0,0,0,.10) 4px);
    }

    /* Vignette */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(0,0,0,.65) 100%);
    }

    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── HEADER ─────────────────────────────────────────────────────────── */
    header {
      position: relative; z-index: 1;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.6rem 1.8rem 1.5rem;
      background: linear-gradient(180deg, #000 0%, rgba(40,0,8,.9) 60%, transparent 100%);
      border-bottom: 1px solid var(--red-border);
      box-shadow: 0 1px 40px rgba(200,17,10,.15);
    }
    header h1 {
      font-family: 'Cinzel Decorative', serif; font-weight: 900;
      font-size: clamp(1.1rem, 3.5vw, 2.2rem);
      color: var(--gold-light); letter-spacing: .08em; text-transform: uppercase;
      text-shadow: 0 0 20px var(--gold-glow), 0 0 60px rgba(212,160,23,.2);
    }
    header p {
      font-family: 'Rajdhani', sans-serif; font-weight: 500;
      color: var(--text-muted); font-size: .78rem;
      letter-spacing: .2em; text-transform: uppercase; margin-top: .25rem;
    }
    #import-btn {
      flex-shrink: 0; font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: .82rem; letter-spacing: .1em; text-transform: uppercase;
      padding: .5rem 1.2rem; background: transparent;
      border: 1px solid var(--red-border); color: var(--red);
      cursor: pointer; transition: background .2s, color .2s, border-color .2s;
      clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    }
    #import-btn:hover { background: var(--red); color: #fff; border-color: var(--red); }

    /* ── MODAL ──────────────────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.85); z-index: 100;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg-card); width: 100%; max-width: 540px;
      padding: 2rem; position: relative;
      border: 1px solid var(--red-border);
      box-shadow: 0 0 40px rgba(200,17,10,.2), inset 0 0 60px rgba(0,0,0,.5);
      /* Corner brackets */
      outline: 1px solid var(--border);
      outline-offset: 6px;
    }
    .modal-box::before, .modal-box::after,
    .modal-box .corner-br, .modal-box .corner-tl2 {
      content: ''; position: absolute; width: 14px; height: 14px;
      border-color: var(--gold); border-style: solid;
    }
    .modal-box::before  { top: -1px;  left: -1px;  border-width: 2px 0 0 2px; }
    .modal-box::after   { top: -1px;  right: -1px; border-width: 2px 2px 0 0; }
    .modal-box .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    .modal-box .corner-tl2{ bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; }
    #close-modal {
      position: absolute; top: .8rem; right: .9rem;
      background: none; border: none; color: var(--text-muted);
      font-size: 1.2rem; cursor: pointer; font-family: 'Rajdhani', sans-serif;
      transition: color .2s;
    }
    #close-modal:hover { color: var(--red); }
    #drop-zone {
      border: 1px dashed var(--red-dark); padding: 2.2rem 1.5rem;
      text-align: center; cursor: pointer; background: var(--bg-raised);
      transition: border-color .25s, background .25s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--red); background: var(--red-bg);
    }
    #drop-zone .dz-icon { font-size: 2rem; display: block; margin-bottom: .6rem; }
    #drop-zone h2 {
      font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.05rem;
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: .35rem;
    }
    #drop-zone p { color: var(--text-muted); font-size: .82rem; letter-spacing: .04em; }
    #browse-btn {
      display: inline-block; margin-top: .9rem;
      padding: .45rem 1.4rem; border: 1px solid var(--gold-border);
      color: var(--gold); background: transparent; cursor: pointer;
      font-family: 'Rajdhani', sans-serif; font-size: .85rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      transition: background .2s, color .2s;
      clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
    }
    #browse-btn:hover { background: var(--gold); color: var(--bg); }
    #file-input { display: none; }
    .modal-footer { display: flex; justify-content: flex-start; margin-top: 1.1rem; }
    #clear-btn {
      padding: .38rem .9rem; border: 1px solid rgba(200,17,10,.3);
      color: rgba(220,80,70,.8); background: transparent; cursor: pointer;
      font-family: 'Rajdhani', sans-serif; font-size: .8rem; font-weight: 600;
      letter-spacing: .08em; text-transform: uppercase;
      transition: background .2s, border-color .2s, color .2s;
    }
    #clear-btn:hover { background: rgba(200,17,10,.12); border-color: var(--red); color: #ff6060; }
    .msg {
      display: none; padding: .7rem 1rem; font-size: .86rem;
      text-align: center; margin-top: .9rem; letter-spacing: .04em;
      font-weight: 600; text-transform: uppercase; font-family: 'Rajdhani', sans-serif;
    }
    #error-msg { background: rgba(200,17,10,.15); border: 1px solid rgba(200,17,10,.4); color: #ff6060; }
    #info-msg  { background: var(--gold-bg); border: 1px solid var(--gold-border); color: var(--gold-light); }

    /* ── EMPTY STATE ────────────────────────────────────────────────────── */
    #empty-state {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 1.2rem;
      text-align: center; padding: 2rem; position: relative; z-index: 1;
    }
    #empty-state .empty-icon { font-size: 3rem; }
    #empty-state h2 {
      font-family: 'Cinzel Decorative', serif; color: var(--gold);
      font-size: 1.3rem; letter-spacing: .1em;
      text-shadow: 0 0 20px var(--gold-glow);
    }
    #empty-state p { color: var(--text-muted); max-width: 360px; font-size: .9rem; letter-spacing: .04em; }
    #empty-start-btn {
      padding: .65rem 2rem; border: 1px solid var(--red-border); color: var(--red);
      background: transparent; cursor: pointer; margin-top: .4rem;
      font-family: 'Rajdhani', sans-serif; font-size: .95rem; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: background .2s, color .2s;
    }
    #empty-start-btn:hover { background: var(--red); color: #fff; }

    /* ── MONTH NAV ──────────────────────────────────────────────────────── */
    .month-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 1.4rem; padding: 2rem 1rem .6rem; position: relative; z-index: 1;
    }
    .month-nav-btn {
      background: var(--bg-card); border: 1px solid var(--red-border);
      width: 2.2rem; height: 2.2rem; color: var(--red); font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s;
      clip-path: polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);
      flex-shrink: 0;
    }
    .month-nav-btn:hover:not(:disabled) { background: var(--red-bg); border-color: var(--red); }
    .month-nav-btn:disabled { opacity: .2; cursor: default; }
    .month-center { text-align: center; min-width: 200px; }
    #month-label {
      display: block; font-family: 'Cinzel', serif; font-size: 1.6rem; font-weight: 700;
      color: var(--gold-light); letter-spacing: .1em; text-transform: uppercase;
      text-shadow: 0 0 20px var(--gold-glow);
    }
    #month-stats {
      display: block; color: var(--text-muted); font-size: .75rem;
      letter-spacing: .15em; text-transform: uppercase; margin-top: .2rem;
    }

    /* ── PODIUM ─────────────────────────────────────────────────────────── */
    #podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: clamp(.5rem, 2vw, 2.5rem); padding: 2.5rem 1rem 0;
      max-width: 700px; margin: 0 auto; position: relative; z-index: 1;
    }
    .pod-slot { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 190px; }
    .pod-slot.empty .pod-stand { opacity: .15; }
    .pod-info { text-align: center; margin-bottom: .7rem; }
    .pod-medal { font-size: 1.7rem; line-height: 1; margin-bottom: .35rem; }
    .pod-name {
      font-family: 'Cinzel', serif; font-size: .82rem; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase; line-height: 1.4;
    }
    .pod-pts {
      font-family: 'Rajdhani', sans-serif; font-size: .75rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase; margin-top: .25rem;
    }
    .pod-stand {
      width: 100%; display: flex; align-items: flex-start;
      justify-content: center; padding-top: .5rem;
    }
    .pod-rank { font-size: .65rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; opacity: .7; }

    .pod-slot.p1 .pod-stand {
      height: 95px;
      background: linear-gradient(180deg, #7A4800 0%, #2A1500 100%);
      border-top: 2px solid var(--gold);
      box-shadow: 0 0 20px var(--gold-glow), 0 0 50px rgba(212,160,23,.15);
      animation: champion-glow 2.5s ease-in-out infinite;
    }
    .pod-slot.p2 .pod-stand {
      height: 65px;
      background: linear-gradient(180deg,#3A3A3A 0%,#151515 100%);
      border-top: 2px solid #707070;
    }
    .pod-slot.p3 .pod-stand {
      height: 48px;
      background: linear-gradient(180deg,#5A2810 0%,#1A0800 100%);
      border-top: 2px solid #8B5030;
    }
    .pod-slot.p1 .pod-name { color: var(--gold-light); text-shadow: 0 0 12px var(--gold-glow); }
    .pod-slot.p2 .pod-name { color: #C0C0C0; }
    .pod-slot.p3 .pod-name { color: #CD7F40; }
    .pod-slot.p1 .pod-pts  { color: var(--gold); }
    .pod-slot.p2 .pod-pts  { color: #888; }
    .pod-slot.p3 .pod-pts  { color: #8B5030; }

    @keyframes champion-glow {
      0%,100% { box-shadow: 0 0 20px var(--gold-glow), 0 -2px 30px rgba(212,160,23,.2); }
      50%      { box-shadow: 0 0 35px var(--gold-glow), 0 -2px 50px rgba(212,160,23,.3); }
    }

    /* ── TABS ───────────────────────────────────────────────────────────── */
    .tabs { max-width: 1100px; margin: 2rem auto 0; padding: 0 1rem; position: relative; z-index: 1; }
    .tab-nav { display: flex; border-bottom: 1px solid var(--red-border); margin-bottom: 1.4rem; }
    .tab-btn {
      font-family: 'Rajdhani', sans-serif; font-size: .88rem; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      padding: .75rem 1.8rem; background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active  { color: var(--red); border-bottom-color: var(--red); }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── TABLES ─────────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    thead th {
      background: var(--bg-raised); padding: .78rem 1rem;
      text-align: left; color: var(--red);
      font-family: 'Rajdhani', sans-serif; font-weight: 700;
      font-size: .78rem; letter-spacing: .15em; text-transform: uppercase;
      white-space: nowrap; cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--red-border);
    }
    thead th:hover { background: #160003; }
    thead th.sort-asc::after  { content: ' ▲'; font-size: .68em; opacity: .8; }
    thead th.sort-desc::after { content: ' ▼'; font-size: .68em; opacity: .8; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-hover); }
    tbody td { padding: .78rem 1rem; }

    .rank-cell {
      font-family: 'Cinzel', serif; font-size: .95rem; font-weight: 600;
      color: var(--text-muted); width: 3rem; text-align: center;
    }
    .points-cell { font-family: 'Cinzel', serif; font-size: 1.15rem; color: var(--gold); font-weight: 700; }
    .player-cell { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: .95rem; letter-spacing: .04em; }
    tr.top-1 { background: rgba(212,160,23,.07); border-left: 2px solid var(--gold-border); }
    tr.top-2 { background: rgba(160,160,160,.04); border-left: 2px solid rgba(140,140,140,.2); }
    tr.top-3 { background: rgba(139,80,48,.05);   border-left: 2px solid rgba(139,80,48,.2); }

    .score-badge {
      display: inline-block; padding: .15em .6em;
      font-family: 'Rajdhani', sans-serif; font-size: .8rem; font-weight: 700;
      letter-spacing: .06em; clip-path: polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%);
    }
    .sb-10 { background: #0D2E0D; color: #5ECF5E; border: 1px solid #1E5E1E; }
    .sb-9  { background: #0D2A0D; color: #50BE50; border: 1px solid #1A4E1A; }
    .sb-8  { background: #262E0A; color: #98BA30; border: 1px solid #3A4E14; }
    .sb-7  { background: #2E2208; color: #BF9620; border: 1px solid #4E3A10; }
    .sb-lo { background: #2A0A0A; color: #C04040; border: 1px solid #4E1818; }

    /* Health bar style */
    .win-bar { display: flex; align-items: center; gap: .6rem; }
    .win-bar-bg {
      flex: 1; height: 6px; background: #1A0005;
      border: 1px solid var(--border); overflow: hidden; min-width: 40px;
    }
    .win-bar-fill { height: 100%; background: linear-gradient(90deg, var(--red-dark), var(--red), #FF3320); }

    /* History */
    .date-col {
      font-family: 'Cinzel', serif; color: var(--gold); white-space: nowrap;
      font-size: .82rem; letter-spacing: .04em;
    }
    .hscore { text-align: center; min-width: 65px; white-space: nowrap; font-size: .88rem; font-weight: 600; }
    .hscore.winner {
      background: rgba(212,160,23,.15); color: var(--gold-light); font-weight: 700;
      box-shadow: inset 2px 0 0 var(--gold), inset -2px 0 0 var(--gold);
    }
    .winner-col { color: var(--gold); font-size: .8rem; white-space: nowrap; font-weight: 600; letter-spacing: .04em; }

    /* ── ARCHIVES ───────────────────────────────────────────────────────── */
    #archives-section {
      display: none;
      max-width: 1100px; margin: 2.5rem auto 3rem; padding: 0 1rem;
      position: relative; z-index: 1;
    }
    .archives-title {
      font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: .75rem;
      color: var(--text-muted); text-align: center; letter-spacing: .25em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem;
    }
    .archives-title::before, .archives-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--red-border), transparent);
    }
    .archives-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 1rem;
    }
    .archive-card {
      background: var(--bg-card); border: 1px solid var(--border);
      padding: 1rem 1.1rem; cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .archive-card::before, .archive-card::after {
      content: ''; position: absolute; width: 8px; height: 8px;
      border-color: var(--red-dark); border-style: solid;
    }
    .archive-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .archive-card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
    .archive-card:hover { border-color: var(--red-border); background: var(--red-bg); }
    .archive-month {
      font-family: 'Cinzel', serif; font-size: .9rem; font-weight: 700;
      color: var(--gold); margin-bottom: .6rem; letter-spacing: .06em;
      text-transform: uppercase;
    }
    .archive-podium { display: flex; flex-direction: column; gap: .3rem; }
    .archive-row { font-size: .82rem; display: flex; gap: .4rem; align-items: baseline; }
    .archive-row .arc-medal { font-size: .85rem; }
    .archive-row .arc-name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; font-weight: 500; }
    .archive-row .arc-pts  { color: var(--text-muted); font-size: .72rem; flex-shrink: 0; font-weight: 600; }

    /* ── RESPONSIVE ─────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 1.1rem 1rem; }
      header h1 { font-size: 1rem; }
      #month-label { font-size: 1.25rem; }
      .pod-name { font-size: .72rem; }
      .pod-medal { font-size: 1.4rem; }
      .tab-btn { padding: .65rem 1rem; font-size: .8rem; }
      thead th, tbody td { padding: .6rem .55rem; font-size: .8rem; }
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header>
  <div>
    <h1>La Table des Savoirs</h1>
    <p>⚔ Tournoi du quiz quotidien ⚔</p>
  </div>
  <button id="import-btn">📥 Importer</button>
</header>

<!-- Import modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <span class="corner-br"></span><span class="corner-tl2"></span>
    <button id="close-modal">✕</button>
    <div id="drop-zone">
      <span class="dz-icon">📜</span>
      <h2>Importer un export WhatsApp</h2>
      <p>Glissez-déposez votre fichier .txt ici</p>
      <button id="browse-btn">Parcourir…</button>
      <input type="file" id="file-input" accept=".txt,text/plain">
    </div>
    <div id="error-msg" class="msg"></div>
    <div id="info-msg"  class="msg"></div>
    <div class="modal-footer">
      <button id="clear-btn">✕ Effacer toutes les données</button>
    </div>
  </div>
</div>

<!-- Empty state -->
<div id="empty-state">
  <span class="empty-icon">📜</span>
  <h2>Aucune donnée</h2>
  <p>Importez votre export WhatsApp pour afficher le classement.</p>
  <button id="empty-start-btn">📥 Importer un fichier</button>
</div>

<!-- Main content -->
<div id="main-content" style="display:none">

  <!-- Month navigation -->
  <div class="month-nav">
    <button class="month-nav-btn" id="prev-month-btn" disabled>‹</button>
    <div class="month-center">
      <span id="month-label">—</span>
      <span id="month-stats"></span>
    </div>
    <button class="month-nav-btn" id="next-month-btn" disabled>›</button>
  </div>

  <!-- Podium -->
  <div id="podium"></div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="ranking">🏆 Classement</button>
      <button class="tab-btn"        data-tab="history">📅 Historique</button>
    </div>

    <div id="ranking-pane" class="tab-pane active">
      <div class="table-wrap">
        <table id="ranking-table">
          <thead>
            <tr>
              <th data-col="rank"       class="sort-asc">Rang</th>
              <th data-col="name">Joueur</th>
              <th data-col="points">Points</th>
              <th data-col="daysPlayed">Jours joués</th>
              <th data-col="bestScore">Meilleur</th>
              <th data-col="winPct">% Victoires</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </div>
    </div>

    <div id="history-pane" class="tab-pane">
      <div class="table-wrap">
        <table id="history-table">
          <thead id="history-head"></thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Archives -->
<div id="archives-section">
  <div class="archives-title">Mois précédents</div>
  <div class="archives-grid" id="archives-grid"></div>
</div>

<script>
/* ── STATE ───────────────────────────────────────────────────────────────── */
let byDate        = {};   // { 'DD/MM/YYYY': [{player,score}] }
let dayWinners    = {};   // { 'DD/MM/YYYY': [playerName] }
let availMonths   = [];   // ['MM/YYYY', ...] asc chronological
let curMonthIdx   = 0;    // index into availMonths

let sortCol = 'rank';
let sortDir = 1;

/* ── MODAL ───────────────────────────────────────────────────────────────── */
function openModal()  { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); hideMsg(); }

document.getElementById('import-btn').addEventListener('click', openModal);
document.getElementById('empty-start-btn').addEventListener('click', openModal);
document.getElementById('close-modal').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

/* ── FILE HANDLING ───────────────────────────────────────────────────────── */
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });
document.getElementById('clear-btn').addEventListener('click', clearData);

/* ── PERSISTENCE ─────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'tds_v1';

function lsSet(e) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(e)); } catch(_) {} }
function lsGet()  { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(_) { return []; } }

async function saveEntries(entries) {
  lsSet(entries);
  try {
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entries)
    });
  } catch(_) {}
}

async function loadEntries() {
  try {
    const r = await fetch('/api/data');
    if (r.ok) {
      const d = await r.json();
      if (Array.isArray(d)) { lsSet(d); return d; }
    }
  } catch(_) {}
  return lsGet();
}

/* ── PARSER ──────────────────────────────────────────────────────────────── */
function parseMessageStart(line) {
  const fA = line.match(/^\[(\d{2}\/\d{2}\/\d{4})[,\s]+\d{2}:\d{2}(?::\d{2})?\]\s+(.+?):\s*([\s\S]*)$/);
  if (fA) return { date: fA[1], player: fA[2].trim(), content: fA[3] };
  const fB = line.match(/^(\d{2}\/\d{2}\/\d{4}),\s+\d{2}:\d{2}\s+-\s+(.+?):\s*([\s\S]*)$/);
  if (fB) return { date: fB[1], player: fB[2].trim(), content: fB[3] };
  return null;
}
function isMsgStart(l) { return !!parseMessageStart(l); }

const QUIZ_RE  = /Quiz[^(]*\((\d+)\/10\)/i;
const TABLE_RE = /La Table des Savoirs/i;

function parseWhatsApp(text) {
  const lines = text
    .replace(/^﻿/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n')
    .split('\n')
    .map(l => l.replace(/^[‎‏‪-‮⁦-⁩﻿]+/, ''));
  const entries = [];
  let i = 0;
  while (i < lines.length) {
    const msg = parseMessageStart(lines[i]);
    if (!msg) { i++; continue; }
    let j = i + 1;
    while (j < lines.length && !isMsgStart(lines[j])) j++;
    const full = msg.content + (j > i + 1 ? '\n' + lines.slice(i + 1, j).join('\n') : '');
    if (TABLE_RE.test(full)) {
      const sm = full.match(QUIZ_RE);
      if (sm) entries.push({ date: msg.date, player: msg.player.replace(/\s+/g,' ').trim(), score: parseInt(sm[1], 10) });
    }
    i = j;
  }
  return entries;
}

/* ── BUILD RANKING ───────────────────────────────────────────────────────── */
async function buildRanking(entries) {
  // Deduplicate: best score per (player, date)
  const bestMap = {};
  for (const e of entries) {
    const k = e.date + '||' + e.player;
    if (!bestMap[k] || e.score > bestMap[k].score) bestMap[k] = e;
  }
  await saveEntries(Object.values(bestMap));

  byDate = {}; dayWinners = {};
  for (const e of Object.values(bestMap)) {
    (byDate[e.date] = byDate[e.date] || []).push(e);
  }
  for (const [date, dayEntries] of Object.entries(byDate)) {
    const max = Math.max(...dayEntries.map(e => e.score));
    dayWinners[date] = dayEntries.filter(e => e.score === max).map(e => e.player);
  }

  // Available months sorted chronologically
  const monthSet = new Set();
  for (const d of Object.keys(byDate)) {
    const [, m, y] = d.split('/');
    monthSet.add(m + '/' + y);
  }
  availMonths = [...monthSet].sort((a, b) => monthKey(a) - monthKey(b));

  // Default: most recent month
  curMonthIdx = availMonths.length - 1;

  showMainContent();
  renderCurrentMonth();
  renderArchives();
}

function monthKey(mk) {
  const [m, y] = mk.split('/');
  return parseInt(y) * 12 + parseInt(m);
}

/* ── MONTH DATA ──────────────────────────────────────────────────────────── */
function getMonthRanking(mk) {
  const [m, y] = mk.split('/');
  const pmap = {};
  for (const [date, dayEntries] of Object.entries(byDate)) {
    const [, dm, dy] = date.split('/');
    if (dm !== m || dy !== y) continue;
    const winners = dayWinners[date];
    for (const e of dayEntries) {
      if (!pmap[e.player]) pmap[e.player] = { name: e.player, points: 0, daysPlayed: 0, bestScore: 0, wins: 0, totalScore: 0 };
      const p = pmap[e.player];
      p.daysPlayed++; p.bestScore = Math.max(p.bestScore, e.score); p.totalScore += e.score;
      if (winners.includes(e.player)) { p.points++; p.wins++; }
    }
  }
  return Object.values(pmap).map(p => ({
    ...p, winPct: p.daysPlayed ? Math.round(100 * p.wins / p.daysPlayed) : 0
  }));
}

function getMonthDates(mk) {
  const [m, y] = mk.split('/');
  return Object.keys(byDate)
    .filter(d => { const [, dm, dy] = d.split('/'); return dm === m && dy === y; })
    .sort((a, b) => dateToInt(b) - dateToInt(a));
}

function getMonthPlayers(mk) {
  const ranking = getMonthRanking(mk);
  return [...ranking].sort((a,b) => b.points - a.points || a.name.localeCompare(b.name,'fr')).map(p => p.name);
}

/* ── RANK MAP ────────────────────────────────────────────────────────────── */
function buildRankMap(ranking) {
  const sorted = [...ranking].sort((a, b) => b.points - a.points || a.name.localeCompare(b.name,'fr'));
  const map = {}; let rank = 1;
  for (let i = 0; i < sorted.length; i++) {
    if (i > 0 && sorted[i].points < sorted[i-1].points) rank = i + 1;
    map[sorted[i].name] = rank;
  }
  return map;
}

/* ── RENDER CURRENT MONTH ────────────────────────────────────────────────── */
function renderCurrentMonth() {
  const mk = availMonths[curMonthIdx];
  const ranking = getMonthRanking(mk);
  const dates   = getMonthDates(mk);

  // Month label & stats
  const [m, y] = mk.split('/');
  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('month-label').textContent = MONTHS[parseInt(m)-1] + ' ' + y;

  const players = new Set(); dates.forEach(d => byDate[d].forEach(e => players.add(e.player)));
  document.getElementById('month-stats').textContent = players.size + ' joueur' + (players.size > 1?'s':'') + ' · ' + dates.length + ' jour' + (dates.length > 1?'s':'');

  // Nav buttons
  document.getElementById('prev-month-btn').disabled = curMonthIdx === 0;
  document.getElementById('next-month-btn').disabled = curMonthIdx === availMonths.length - 1;

  renderPodium(ranking);
  renderMonthRanking(ranking);
  renderMonthHistory(mk, dates);
}

/* ── RENDER PODIUM ───────────────────────────────────────────────────────── */
const MEDALS = ['🥇','🥈','🥉'];

function renderPodium(ranking) {
  const rankMap = buildRankMap(ranking);
  const groups = {};
  for (const p of ranking) {
    const r = rankMap[p.name];
    if (r <= 3) (groups[r] = groups[r] || []).push(p);
  }

  // Display order: 2nd left, 1st center, 3rd right
  const slots = [
    { rank: 2, cls: 'p2', medal: '🥈', height: 60 },
    { rank: 1, cls: 'p1', medal: '🥇', height: 90 },
    { rank: 3, cls: 'p3', medal: '🥉', height: 45 },
  ];

  document.getElementById('podium').innerHTML = slots.map(slot => {
    const players = groups[slot.rank];
    if (!players) {
      return `<div class="pod-slot ${slot.cls} empty">
        <div class="pod-info"><div class="pod-medal" style="opacity:.15">${slot.medal}</div></div>
        <div class="pod-stand" style="height:${slot.height}px"></div>
      </div>`;
    }
    const pts = players[0].points;
    return `<div class="pod-slot ${slot.cls}">
      <div class="pod-info">
        <div class="pod-medal">${slot.medal}</div>
        ${players.map(p => `<div class="pod-name">${esc(p.name)}</div>`).join('')}
        <div class="pod-pts">${pts} pt${pts > 1 ? 's' : ''}</div>
      </div>
      <div class="pod-stand" style="height:${slot.height}px"></div>
    </div>`;
  }).join('');
}

/* ── RENDER RANKING TABLE ────────────────────────────────────────────────── */
function renderMonthRanking(ranking) {
  const rankMap = buildRankMap(ranking);
  const sorted  = [...ranking].sort((a, b) => {
    let va, vb;
    if      (sortCol === 'rank')      { va = rankMap[a.name]; vb = rankMap[b.name]; }
    else if (sortCol === 'name')      { return sortDir * a.name.localeCompare(b.name,'fr'); }
    else                              { va = a[sortCol]; vb = b[sortCol]; }
    if (va !== vb) return sortDir * (va - vb);
    return a.name.localeCompare(b.name,'fr');
  });

  document.querySelectorAll('#ranking-table thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });

  document.getElementById('ranking-body').innerHTML = sorted.map(p => {
    const rank = rankMap[p.name];
    const medal = rank <= 3 ? MEDALS[rank-1] : '';
    return `<tr${rank<=3?' class="top-'+rank+'"':''}>
      <td class="rank-cell">${medal||rank}</td>
      <td class="player-cell">${esc(p.name)}</td>
      <td class="points-cell">${p.points}</td>
      <td>${p.daysPlayed}</td>
      <td>${scoreBadge(p.bestScore)}</td>
      <td><div class="win-bar"><span>${p.winPct}%</span>
        <div class="win-bar-bg"><div class="win-bar-fill" style="width:${p.winPct}%"></div></div>
      </div></td>
    </tr>`;
  }).join('');
}

function scoreBadge(s) {
  const cls = s===10?'sb-10':s===9?'sb-9':s>=8?'sb-8':s>=7?'sb-7':'sb-lo';
  return `<span class="score-badge ${cls}">${s}/10</span>`;
}

/* ── RENDER HISTORY TABLE ────────────────────────────────────────────────── */
function renderMonthHistory(mk, dates) {
  const players = getMonthPlayers(mk);

  document.getElementById('history-head').innerHTML =
    '<tr><th style="cursor:default">Date</th>' +
    players.map(p => `<th style="cursor:default">${esc(p)}</th>`).join('') +
    '<th style="cursor:default">Vainqueur(s)</th></tr>';

  document.getElementById('history-body').innerHTML = dates.map(date => {
    const scoreOf = {};
    for (const e of byDate[date]) scoreOf[e.player] = e.score;
    const winners = dayWinners[date];
    const cells = players.map(p => {
      if (scoreOf[p] == null) return `<td class="hscore"></td>`;
      return `<td class="hscore${winners.includes(p)?' winner':''}">${scoreOf[p]}/10</td>`;
    }).join('');
    return `<tr>
      <td class="date-col">${formatDate(date)}</td>
      ${cells}
      <td class="winner-col">${winners.map(esc).join(', ')}</td>
    </tr>`;
  }).join('');
}

/* ── RENDER ARCHIVES ─────────────────────────────────────────────────────── */
function renderArchives() {
  const past = availMonths.slice(0, -1); // all except last (current)
  const section = document.getElementById('archives-section');
  if (!past.length) { section.style.display = 'none'; return; }

  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const ARC_MEDALS = ['🥇','🥈','🥉'];

  document.getElementById('archives-grid').innerHTML = [...past].reverse().map((mk, i) => {
    const [m, y] = mk.split('/');
    const ranking = getMonthRanking(mk);
    const rankMap = buildRankMap(ranking);
    const sorted  = [...ranking].sort((a,b) => b.points-a.points || a.name.localeCompare(b.name,'fr'));
    const top3    = sorted.filter(p => rankMap[p.name] <= 3).slice(0, 3);
    const idx     = availMonths.indexOf(mk);

    return `<div class="archive-card" data-idx="${idx}">
      <div class="archive-month">${MONTHS[parseInt(m)-1]} ${y}</div>
      <div class="archive-podium">
        ${top3.map((p, ri) => `<div class="archive-row">
          <span class="arc-medal">${ARC_MEDALS[rankMap[p.name]-1]||''}</span>
          <span class="arc-name">${esc(p.name)}</span>
          <span class="arc-pts">${p.points}pt</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  section.style.display = 'block';

  section.querySelectorAll('.archive-card').forEach(card => {
    card.addEventListener('click', () => {
      curMonthIdx = parseInt(card.dataset.idx);
      renderCurrentMonth();
      document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' });
    });
  });
}

/* ── NAVIGATION ──────────────────────────────────────────────────────────── */
document.getElementById('prev-month-btn').addEventListener('click', () => {
  if (curMonthIdx > 0) { curMonthIdx--; renderCurrentMonth(); }
});
document.getElementById('next-month-btn').addEventListener('click', () => {
  if (curMonthIdx < availMonths.length - 1) { curMonthIdx++; renderCurrentMonth(); }
});

/* ── SORT ────────────────────────────────────────────────────────────────── */
document.querySelectorAll('#ranking-table thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = (col === 'name' || col === 'rank') ? 1 : -1; }
    renderMonthRanking(getMonthRanking(availMonths[curMonthIdx]));
  });
});

/* ── TABS ────────────────────────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === tab+'-pane'));
  });
});

/* ── FILE PROCESSING ─────────────────────────────────────────────────────── */
function processFile(file) {
  const reader = new FileReader();
  reader.onload = async e => {
    const newEntries = parseWhatsApp(e.target.result);
    if (!newEntries.length) {
      showError('Aucune partie trouvée. Vérifiez que le fichier est bien un export WhatsApp contenant des scores "La Table des Savoirs".');
      return;
    }
    const stored = await loadEntries();
    await buildRanking([...stored, ...newEntries]);
    hideMsg();
    const total = Object.values(byDate).reduce((s, d) => s + d.length, 0);
    const added = total - stored.length;
    showInfo(added > 0
      ? `✓ ${added} nouvelle(s) partie(s) ajoutée(s) · ${total} au total`
      : `✓ Fichier traité — aucune nouvelle partie (${total} au total)`);
  };
  reader.onerror = () => showError('Impossible de lire le fichier.');
  reader.readAsText(file, 'UTF-8');
}

async function clearData() {
  if (!confirm('Effacer toutes les données sauvegardées ?')) return;
  await saveEntries([]);
  localStorage.removeItem(STORAGE_KEY);
  byDate = {}; dayWinners = {}; availMonths = []; curMonthIdx = 0;
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('archives-section').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
  closeModal();
}

/* ── UI HELPERS ──────────────────────────────────────────────────────────── */
function showMainContent() {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
}

function showError(msg) {
  const el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block';
  document.getElementById('info-msg').style.display = 'none';
}
function showInfo(msg) {
  const el = document.getElementById('info-msg'); el.textContent = msg; el.style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}
function hideMsg() {
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('info-msg').style.display  = 'none';
}

/* ── UTILS ───────────────────────────────────────────────────────────────── */
function dateToInt(s) { const [d,m,y] = s.split('/'); return parseInt(y+m+d,10); }
const MONTHS_FR = ['jan.','fév.','mar.','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];
function formatDate(s) { const [d,m,y] = s.split('/'); return `${parseInt(d,10)} ${MONTHS_FR[parseInt(m,10)-1]} ${y}`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── BACKGROUND PARTICLES ────────────────────────────────────────────────── */
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H;

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize);
  resize();

  /* Particle types:
     'ember'  – orange/red sparks drifting up        (most common)
     'wisp'   – large faint smoke puffs              (atmospheric)
     'spark'  – tiny bright white flash              (rare, fleeting)  */
  class P {
    constructor(type) { this.type = type; this.init(); }

    init() {
      const t = this.type;
      this.x  = Math.random() * W;
      this.y  = t === 'spark' ? Math.random() * H : H + Math.random() * 60;

      if (t === 'ember') {
        this.r        = Math.random() * 1.6 + .4;
        this.vy       = -(Math.random() * 1.1 + .35);
        this.vx       = (Math.random() - .5) * .5;
        this.hue      = Math.random() * 35 + 5;   // 5–40 → red-orange
        this.sat      = 100;
        this.maxAlpha = Math.random() * .55 + .15;
        this.maxLife  = Math.random() * 220 + 120;
        this.wobble   = Math.random() * .08 + .03;
      } else if (t === 'wisp') {
        this.r        = Math.random() * 18 + 10;
        this.vy       = -(Math.random() * .35 + .1);
        this.vx       = (Math.random() - .5) * .25;
        this.hue      = Math.random() * 20;        // deep red
        this.sat      = 60;
        this.maxAlpha = Math.random() * .07 + .02;
        this.maxLife  = Math.random() * 300 + 200;
        this.wobble   = Math.random() * .02;
      } else {                                     // spark
        this.r        = Math.random() * .8 + .2;
        this.vy       = -(Math.random() * 3 + 1);
        this.vx       = (Math.random() - .5) * 2;
        this.hue      = Math.random() * 50 + 30;  // yellow-orange
        this.sat      = 100;
        this.maxAlpha = 1;
        this.maxLife  = Math.random() * 40 + 15;
        this.wobble   = 0;
      }

      this.life  = t === 'wisp' ? Math.random() * this.maxLife : 0;
      this.alpha = 0;
    }

    update() {
      this.life++;
      const prog = this.life / this.maxLife;
      // Fade in for first 20%, fade out for last 40%
      const a = prog < .2 ? prog / .2 : prog > .6 ? (1 - prog) / .4 : 1;
      this.alpha = a * this.maxAlpha;
      this.x += this.vx + Math.sin(this.life * this.wobble) * .4;
      this.y += this.vy;
      if (this.life >= this.maxLife) this.init();
    }

    draw() {
      if (this.alpha <= 0) return;
      const { x, y, r, hue, sat, alpha } = this;
      ctx.save();
      ctx.globalCompositeOperation = this.type === 'wisp' ? 'screen' : 'lighter';
      if (this.type === 'wisp') {
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, `hsla(${hue},${sat}%,40%,${alpha})`);
        g.addColorStop(1, `hsla(${hue},${sat}%,20%,0)`);
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = g; ctx.fill();
      } else {
        ctx.shadowBlur = r * 8;
        ctx.shadowColor = `hsla(${hue},100%,60%,${alpha})`;
        ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${hue},100%,75%,${alpha})`;
        ctx.fill();
      }
      ctx.restore();
    }
  }

  // Spawn pool: 55 embers, 20 wisps, 8 sparks
  const pool = [
    ...Array.from({length: 55}, () => new P('ember')),
    ...Array.from({length: 20}, () => new P('wisp')),
    ...Array.from({length:  8}, () => new P('spark')),
  ];
  // Stagger starting positions
  pool.forEach(p => { p.life = Math.random() * p.maxLife * .8; });

  function loop() {
    ctx.clearRect(0, 0, W, H);
    pool.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
})();

/* ── INIT ────────────────────────────────────────────────────────────────── */
(async function init() {
  const stored = await loadEntries();
  if (stored.length) {
    await buildRanking(stored);
  } else {
    document.getElementById('empty-state').style.display = 'flex';
  }
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Table des Savoirs — Classement</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold:        #C9A84C;
      --gold-light:  #E8C96A;
      --gold-dim:    #8B6914;
      --gold-bg:     rgba(201,168,76,0.10);
      --gold-border: rgba(201,168,76,0.35);
      --silver:      #9E9E9E;
      --bronze:      #A0705A;
      --bg:          #0D0D1A;
      --bg-card:     #161625;
      --bg-raised:   #1F1F35;
      --bg-hover:    rgba(255,255,255,0.03);
      --text:        #E2D9C8;
      --text-muted:  #7A7060;
      --border:      #252540;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ─────────────────────────────────────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.6rem 1.5rem 1.4rem;
      background: linear-gradient(180deg,#08080F 0%,var(--bg) 100%);
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      color: var(--gold); letter-spacing: .05em;
      text-shadow: 0 0 40px rgba(201,168,76,.2);
    }
    header p { color: var(--text-muted); font-size: .8rem; font-style: italic; margin-top: .2rem; }
    #import-btn {
      flex-shrink: 0;
      padding: .5rem 1.1rem;
      border: 1px solid var(--gold-dim); border-radius: 7px;
      background: transparent; color: var(--gold);
      cursor: pointer; font-size: .85rem; font-family: 'Inter', sans-serif;
      transition: background .2s, color .2s;
    }
    #import-btn:hover { background: var(--gold); color: var(--bg); }

    /* ── MODAL ──────────────────────────────────────────────────────────── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 100;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 560px;
      padding: 2rem; position: relative;
    }
    #close-modal {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none; color: var(--text-muted);
      font-size: 1.3rem; cursor: pointer; line-height: 1;
    }
    #close-modal:hover { color: var(--text); }
    #drop-zone {
      border: 2px dashed var(--gold-dim); border-radius: 10px;
      padding: 2.5rem 1.5rem; text-align: center; cursor: pointer;
      background: var(--bg-raised); transition: border-color .25s, background .25s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: var(--gold); background: var(--gold-bg);
    }
    #drop-zone .dz-icon { font-size: 2.2rem; display: block; margin-bottom: .7rem; }
    #drop-zone h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.15rem; margin-bottom: .35rem; }
    #drop-zone p  { color: var(--text-muted); font-size: .85rem; }
    #browse-btn {
      display: inline-block; margin-top: 1rem;
      padding: .5rem 1.4rem; border: 1px solid var(--gold);
      color: var(--gold); border-radius: 6px; background: transparent;
      cursor: pointer; font-size: .85rem; font-family: 'Inter', sans-serif;
      transition: background .2s, color .2s;
    }
    #browse-btn:hover { background: var(--gold); color: var(--bg); }
    #file-input { display: none; }
    .modal-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 1.2rem;
    }
    #clear-btn {
      padding: .4rem 1rem; border: 1px solid rgba(200,60,60,.35);
      color: rgba(220,100,100,.8); border-radius: 6px;
      background: transparent; cursor: pointer; font-size: .82rem;
      font-family: 'Inter', sans-serif; transition: background .2s, border-color .2s, color .2s;
    }
    #clear-btn:hover { background: rgba(200,60,60,.1); border-color: rgba(200,60,60,.6); color: #ff8888; }
    .msg {
      display: none; padding: .75rem 1rem; border-radius: 7px;
      font-size: .88rem; text-align: center; margin-top: 1rem;
    }
    #error-msg { background: rgba(200,60,60,.15); border: 1px solid rgba(200,60,60,.4); color: #ff8888; }
    #info-msg  { background: var(--gold-bg); border: 1px solid var(--gold-border); color: var(--gold-light);
                 font-family: 'Playfair Display', serif; }

    /* ── EMPTY STATE ────────────────────────────────────────────────────── */
    #empty-state {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 1.2rem;
      text-align: center; padding: 2rem;
    }
    #empty-state .empty-icon { font-size: 3.5rem; }
    #empty-state h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.4rem; }
    #empty-state p  { color: var(--text-muted); max-width: 360px; font-size: .9rem; }
    #empty-start-btn {
      padding: .7rem 1.8rem; border: 1px solid var(--gold);
      color: var(--gold); border-radius: 8px; background: transparent;
      cursor: pointer; font-size: .95rem; font-family: 'Inter', sans-serif;
      transition: background .2s, color .2s; margin-top: .4rem;
    }
    #empty-start-btn:hover { background: var(--gold); color: var(--bg); }

    /* ── MONTH NAV ──────────────────────────────────────────────────────── */
    .month-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 1.2rem; padding: 1.8rem 1rem .5rem;
    }
    .month-nav-btn {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 50%; width: 2.2rem; height: 2.2rem;
      color: var(--gold); font-size: 1.2rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .2s, background .2s;
      flex-shrink: 0;
    }
    .month-nav-btn:hover:not(:disabled) { border-color: var(--gold); background: var(--gold-bg); }
    .month-nav-btn:disabled { opacity: .25; cursor: default; }
    .month-center { text-align: center; min-width: 180px; }
    #month-label {
      display: block;
      font-family: 'Playfair Display', serif; font-size: 1.6rem;
      color: var(--gold); letter-spacing: .04em;
    }
    #month-stats { color: var(--text-muted); font-size: .8rem; display: block; margin-top: .15rem; }

    /* ── PODIUM ─────────────────────────────────────────────────────────── */
    #podium {
      display: flex; align-items: flex-end; justify-content: center;
      gap: clamp(.5rem, 2vw, 2rem); padding: 2rem 1rem 0;
      max-width: 700px; margin: 0 auto;
    }
    .pod-slot {
      display: flex; flex-direction: column; align-items: center;
      flex: 1; max-width: 180px;
    }
    .pod-slot.empty .pod-stand { opacity: .2; }
    .pod-info { text-align: center; margin-bottom: .65rem; }
    .pod-medal { font-size: 1.7rem; line-height: 1; margin-bottom: .3rem; }
    .pod-name {
      font-family: 'Playfair Display', serif; font-size: .88rem;
      color: var(--text); line-height: 1.3;
    }
    .pod-pts { font-size: .8rem; color: var(--text-muted); margin-top: .2rem; }
    .pod-stand {
      width: 100%; border-radius: 6px 6px 0 0;
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: .5rem;
    }
    .pod-rank { font-size: .75rem; font-weight: 600; opacity: .7; letter-spacing: .04em; }
    .pod-slot.p1 .pod-stand { height: 90px; background: linear-gradient(180deg,#C9A84C,#6B4F0A); color: #1a0e00; }
    .pod-slot.p2 .pod-stand { height: 60px; background: linear-gradient(180deg,#888,#444);    color: #111; }
    .pod-slot.p3 .pod-stand { height: 45px; background: linear-gradient(180deg,#9C6040,#5A3018); color: #1a0800; }
    .pod-slot.p1 .pod-name { color: var(--gold-light); }
    .pod-slot.p2 .pod-name { color: #ccc; }
    .pod-slot.p3 .pod-name { color: #d4956a; }

    /* ── TABS ───────────────────────────────────────────────────────────── */
    .tabs { max-width: 1100px; margin: 1.8rem auto 0; padding: 0 1rem; }
    .tab-nav {
      display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1.4rem;
    }
    .tab-btn {
      font-family: 'Playfair Display', serif; font-size: 1rem;
      padding: .75rem 1.6rem; background: none; border: none;
      color: var(--text-muted); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active  { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-btn:hover:not(.active) { color: var(--text); }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── TABLES ─────────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    thead th {
      background: var(--bg-raised); padding: .82rem 1rem;
      text-align: left; color: var(--gold);
      font-family: 'Playfair Display', serif; font-weight: 600;
      white-space: nowrap; cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--border);
    }
    thead th:hover { background: #2A2A48; }
    thead th.sort-asc::after  { content: ' ▲'; font-size: .68em; opacity: .8; }
    thead th.sort-desc::after { content: ' ▼'; font-size: .68em; opacity: .8; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-hover); }
    tbody td { padding: .8rem 1rem; }

    .rank-cell {
      font-family: 'Playfair Display', serif; font-size: 1rem;
      color: var(--text-muted); width: 3rem; text-align: center;
    }
    .points-cell { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); font-weight: 700; }
    .player-cell { font-weight: 500; }
    tr.top-1 { background: rgba(201,168,76,.08); }
    tr.top-2 { background: rgba(192,192,192,.05); }
    tr.top-3 { background: rgba(205,127,50,.05); }

    .score-badge {
      display: inline-block; padding: .18em .55em;
      border-radius: 5px; font-size: .82rem; font-weight: 600;
    }
    .sb-10 { background: #173d17; color: #7fd87f; }
    .sb-9  { background: #163316; color: #6ec86e; }
    .sb-8  { background: #303a10; color: #a8cc40; }
    .sb-7  { background: #3d3010; color: #ccaa30; }
    .sb-lo { background: #3a1515; color: #cc6060; }

    .win-bar { display: flex; align-items: center; gap: .6rem; }
    .win-bar-bg { flex: 1; height: 5px; background: var(--bg-raised); border-radius: 3px; overflow: hidden; min-width: 35px; }
    .win-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; }

    /* History */
    .date-col { font-family: 'Playfair Display', serif; color: var(--gold); white-space: nowrap; font-size: .88rem; }
    .hscore { text-align: center; min-width: 65px; white-space: nowrap; font-size: .88rem; }
    .hscore.winner { background: rgba(201,168,76,.18); color: var(--gold-light); font-weight: 600; box-shadow: inset 2px 0 0 var(--gold); }
    .winner-col { color: var(--gold-light); font-size: .82rem; white-space: nowrap; }

    /* ── ARCHIVES ───────────────────────────────────────────────────────── */
    #archives-section {
      display: none;
      max-width: 1100px; margin: 2.5rem auto 3rem; padding: 0 1rem;
    }
    .archives-title {
      font-family: 'Playfair Display', serif; font-size: 1.1rem;
      color: var(--text-muted); text-align: center; letter-spacing: .06em;
      text-transform: uppercase; font-size: .8rem;
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem;
    }
    .archives-title::before, .archives-title::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .archives-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }
    .archive-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.1rem;
      cursor: pointer; transition: border-color .2s, background .2s;
    }
    .archive-card:hover { border-color: var(--gold-dim); background: var(--gold-bg); }
    .archive-month {
      font-family: 'Playfair Display', serif; font-size: 1rem;
      color: var(--gold); margin-bottom: .6rem;
    }
    .archive-podium { display: flex; flex-direction: column; gap: .25rem; }
    .archive-row { font-size: .82rem; display: flex; gap: .4rem; align-items: baseline; }
    .archive-row .arc-medal { font-size: .9rem; }
    .archive-row .arc-name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .archive-row .arc-pts  { color: var(--text-muted); font-size: .75rem; flex-shrink: 0; }

    /* ── RESPONSIVE ─────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 1.2rem 1rem; }
      header h1 { font-size: 1.3rem; }
      #month-label { font-size: 1.3rem; }
      .pod-name { font-size: .78rem; }
      .pod-medal { font-size: 1.4rem; }
      .tab-btn { padding: .65rem 1rem; font-size: .9rem; }
      thead th, tbody td { padding: .65rem .6rem; font-size: .82rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>La Table des Savoirs</h1>
    <p>Classement du quiz quotidien</p>
  </div>
  <button id="import-btn">📥 Importer</button>
</header>

<!-- Import modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <button id="close-modal">✕</button>
    <div id="drop-zone">
      <span class="dz-icon">📜</span>
      <h2>Importer un export WhatsApp</h2>
      <p>Glissez-déposez votre fichier .txt ici</p>
      <button id="browse-btn">Parcourir…</button>
      <input type="file" id="file-input" accept=".txt,text/plain">
    </div>
    <div id="error-msg" class="msg"></div>
    <div id="info-msg"  class="msg"></div>
    <div class="modal-footer">
      <button id="clear-btn">✕ Effacer toutes les données</button>
    </div>
  </div>
</div>

<!-- Empty state -->
<div id="empty-state">
  <span class="empty-icon">📜</span>
  <h2>Aucune donnée</h2>
  <p>Importez votre export WhatsApp pour afficher le classement.</p>
  <button id="empty-start-btn">📥 Importer un fichier</button>
</div>

<!-- Main content -->
<div id="main-content" style="display:none">

  <!-- Month navigation -->
  <div class="month-nav">
    <button class="month-nav-btn" id="prev-month-btn" disabled>‹</button>
    <div class="month-center">
      <span id="month-label">—</span>
      <span id="month-stats"></span>
    </div>
    <button class="month-nav-btn" id="next-month-btn" disabled>›</button>
  </div>

  <!-- Podium -->
  <div id="podium"></div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab-nav">
      <button class="tab-btn active" data-tab="ranking">🏆 Classement</button>
      <button class="tab-btn"        data-tab="history">📅 Historique</button>
    </div>

    <div id="ranking-pane" class="tab-pane active">
      <div class="table-wrap">
        <table id="ranking-table">
          <thead>
            <tr>
              <th data-col="rank"       class="sort-asc">Rang</th>
              <th data-col="name">Joueur</th>
              <th data-col="points">Points</th>
              <th data-col="daysPlayed">Jours joués</th>
              <th data-col="bestScore">Meilleur</th>
              <th data-col="winPct">% Victoires</th>
            </tr>
          </thead>
          <tbody id="ranking-body"></tbody>
        </table>
      </div>
    </div>

    <div id="history-pane" class="tab-pane">
      <div class="table-wrap">
        <table id="history-table">
          <thead id="history-head"></thead>
          <tbody id="history-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Archives -->
<div id="archives-section">
  <div class="archives-title">Mois précédents</div>
  <div class="archives-grid" id="archives-grid"></div>
</div>

<script>
/* ── STATE ───────────────────────────────────────────────────────────────── */
let byDate        = {};   // { 'DD/MM/YYYY': [{player,score}] }
let dayWinners    = {};   // { 'DD/MM/YYYY': [playerName] }
let availMonths   = [];   // ['MM/YYYY', ...] asc chronological
let curMonthIdx   = 0;    // index into availMonths

let sortCol = 'rank';
let sortDir = 1;

/* ── MODAL ───────────────────────────────────────────────────────────────── */
function openModal()  { document.getElementById('modal-overlay').classList.add('open'); }
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); hideMsg(); }

document.getElementById('import-btn').addEventListener('click', openModal);
document.getElementById('empty-start-btn').addEventListener('click', openModal);
document.getElementById('close-modal').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

/* ── FILE HANDLING ───────────────────────────────────────────────────────── */
const dropZone  = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]);
});
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });
document.getElementById('clear-btn').addEventListener('click', clearData);

/* ── PERSISTENCE ─────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'tds_v1';

function lsSet(e) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(e)); } catch(_) {} }
function lsGet()  { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(_) { return []; } }

async function saveEntries(entries) {
  lsSet(entries);
  try {
    await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entries)
    });
  } catch(_) {}
}

async function loadEntries() {
  try {
    const r = await fetch('/api/data');
    if (r.ok) {
      const d = await r.json();
      if (Array.isArray(d)) { lsSet(d); return d; }
    }
  } catch(_) {}
  return lsGet();
}

/* ── PARSER ──────────────────────────────────────────────────────────────── */
function parseMessageStart(line) {
  const fA = line.match(/^\[(\d{2}\/\d{2}\/\d{4})[,\s]+\d{2}:\d{2}(?::\d{2})?\]\s+(.+?):\s*([\s\S]*)$/);
  if (fA) return { date: fA[1], player: fA[2].trim(), content: fA[3] };
  const fB = line.match(/^(\d{2}\/\d{2}\/\d{4}),\s+\d{2}:\d{2}\s+-\s+(.+?):\s*([\s\S]*)$/);
  if (fB) return { date: fB[1], player: fB[2].trim(), content: fB[3] };
  return null;
}
function isMsgStart(l) { return !!parseMessageStart(l); }

const QUIZ_RE  = /Quiz[^(]*\((\d+)\/10\)/i;
const TABLE_RE = /La Table des Savoirs/i;

function parseWhatsApp(text) {
  const lines = text
    .replace(/^﻿/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n')
    .split('\n')
    .map(l => l.replace(/^[‎‏‪-‮⁦-⁩﻿]+/, ''));
  const entries = [];
  let i = 0;
  while (i < lines.length) {
    const msg = parseMessageStart(lines[i]);
    if (!msg) { i++; continue; }
    let j = i + 1;
    while (j < lines.length && !isMsgStart(lines[j])) j++;
    const full = msg.content + (j > i + 1 ? '\n' + lines.slice(i + 1, j).join('\n') : '');
    if (TABLE_RE.test(full)) {
      const sm = full.match(QUIZ_RE);
      if (sm) entries.push({ date: msg.date, player: msg.player.replace(/\s+/g,' ').trim(), score: parseInt(sm[1], 10) });
    }
    i = j;
  }
  return entries;
}

/* ── BUILD RANKING ───────────────────────────────────────────────────────── */
async function buildRanking(entries) {
  // Deduplicate: best score per (player, date)
  const bestMap = {};
  for (const e of entries) {
    const k = e.date + '||' + e.player;
    if (!bestMap[k] || e.score > bestMap[k].score) bestMap[k] = e;
  }
  await saveEntries(Object.values(bestMap));

  byDate = {}; dayWinners = {};
  for (const e of Object.values(bestMap)) {
    (byDate[e.date] = byDate[e.date] || []).push(e);
  }
  for (const [date, dayEntries] of Object.entries(byDate)) {
    const max = Math.max(...dayEntries.map(e => e.score));
    dayWinners[date] = dayEntries.filter(e => e.score === max).map(e => e.player);
  }

  // Available months sorted chronologically
  const monthSet = new Set();
  for (const d of Object.keys(byDate)) {
    const [, m, y] = d.split('/');
    monthSet.add(m + '/' + y);
  }
  availMonths = [...monthSet].sort((a, b) => monthKey(a) - monthKey(b));

  // Default: most recent month
  curMonthIdx = availMonths.length - 1;

  showMainContent();
  renderCurrentMonth();
  renderArchives();
}

function monthKey(mk) {
  const [m, y] = mk.split('/');
  return parseInt(y) * 12 + parseInt(m);
}

/* ── MONTH DATA ──────────────────────────────────────────────────────────── */
function getMonthRanking(mk) {
  const [m, y] = mk.split('/');
  const pmap = {};
  for (const [date, dayEntries] of Object.entries(byDate)) {
    const [, dm, dy] = date.split('/');
    if (dm !== m || dy !== y) continue;
    const winners = dayWinners[date];
    for (const e of dayEntries) {
      if (!pmap[e.player]) pmap[e.player] = { name: e.player, points: 0, daysPlayed: 0, bestScore: 0, wins: 0, totalScore: 0 };
      const p = pmap[e.player];
      p.daysPlayed++; p.bestScore = Math.max(p.bestScore, e.score); p.totalScore += e.score;
      if (winners.includes(e.player)) { p.points++; p.wins++; }
    }
  }
  return Object.values(pmap).map(p => ({
    ...p, winPct: p.daysPlayed ? Math.round(100 * p.wins / p.daysPlayed) : 0
  }));
}

function getMonthDates(mk) {
  const [m, y] = mk.split('/');
  return Object.keys(byDate)
    .filter(d => { const [, dm, dy] = d.split('/'); return dm === m && dy === y; })
    .sort((a, b) => dateToInt(b) - dateToInt(a));
}

function getMonthPlayers(mk) {
  const ranking = getMonthRanking(mk);
  return [...ranking].sort((a,b) => b.points - a.points || a.name.localeCompare(b.name,'fr')).map(p => p.name);
}

/* ── RANK MAP ────────────────────────────────────────────────────────────── */
function buildRankMap(ranking) {
  const sorted = [...ranking].sort((a, b) => b.points - a.points || a.name.localeCompare(b.name,'fr'));
  const map = {}; let rank = 1;
  for (let i = 0; i < sorted.length; i++) {
    if (i > 0 && sorted[i].points < sorted[i-1].points) rank = i + 1;
    map[sorted[i].name] = rank;
  }
  return map;
}

/* ── RENDER CURRENT MONTH ────────────────────────────────────────────────── */
function renderCurrentMonth() {
  const mk = availMonths[curMonthIdx];
  const ranking = getMonthRanking(mk);
  const dates   = getMonthDates(mk);

  // Month label & stats
  const [m, y] = mk.split('/');
  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  document.getElementById('month-label').textContent = MONTHS[parseInt(m)-1] + ' ' + y;

  const players = new Set(); dates.forEach(d => byDate[d].forEach(e => players.add(e.player)));
  document.getElementById('month-stats').textContent = players.size + ' joueur' + (players.size > 1?'s':'') + ' · ' + dates.length + ' jour' + (dates.length > 1?'s':'');

  // Nav buttons
  document.getElementById('prev-month-btn').disabled = curMonthIdx === 0;
  document.getElementById('next-month-btn').disabled = curMonthIdx === availMonths.length - 1;

  renderPodium(ranking);
  renderMonthRanking(ranking);
  renderMonthHistory(mk, dates);
}

/* ── RENDER PODIUM ───────────────────────────────────────────────────────── */
const MEDALS = ['🥇','🥈','🥉'];

function renderPodium(ranking) {
  const rankMap = buildRankMap(ranking);
  const groups = {};
  for (const p of ranking) {
    const r = rankMap[p.name];
    if (r <= 3) (groups[r] = groups[r] || []).push(p);
  }

  // Display order: 2nd left, 1st center, 3rd right
  const slots = [
    { rank: 2, cls: 'p2', medal: '🥈', height: 60 },
    { rank: 1, cls: 'p1', medal: '🥇', height: 90 },
    { rank: 3, cls: 'p3', medal: '🥉', height: 45 },
  ];

  document.getElementById('podium').innerHTML = slots.map(slot => {
    const players = groups[slot.rank];
    if (!players) {
      return `<div class="pod-slot ${slot.cls} empty">
        <div class="pod-info"><div class="pod-medal" style="opacity:.15">${slot.medal}</div></div>
        <div class="pod-stand" style="height:${slot.height}px"></div>
      </div>`;
    }
    const pts = players[0].points;
    return `<div class="pod-slot ${slot.cls}">
      <div class="pod-info">
        <div class="pod-medal">${slot.medal}</div>
        ${players.map(p => `<div class="pod-name">${esc(p.name)}</div>`).join('')}
        <div class="pod-pts">${pts} pt${pts > 1 ? 's' : ''}</div>
      </div>
      <div class="pod-stand" style="height:${slot.height}px"></div>
    </div>`;
  }).join('');
}

/* ── RENDER RANKING TABLE ────────────────────────────────────────────────── */
function renderMonthRanking(ranking) {
  const rankMap = buildRankMap(ranking);
  const sorted  = [...ranking].sort((a, b) => {
    let va, vb;
    if      (sortCol === 'rank')      { va = rankMap[a.name]; vb = rankMap[b.name]; }
    else if (sortCol === 'name')      { return sortDir * a.name.localeCompare(b.name,'fr'); }
    else                              { va = a[sortCol]; vb = b[sortCol]; }
    if (va !== vb) return sortDir * (va - vb);
    return a.name.localeCompare(b.name,'fr');
  });

  document.querySelectorAll('#ranking-table thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.dataset.col === sortCol) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });

  document.getElementById('ranking-body').innerHTML = sorted.map(p => {
    const rank = rankMap[p.name];
    const medal = rank <= 3 ? MEDALS[rank-1] : '';
    return `<tr${rank<=3?' class="top-'+rank+'"':''}>
      <td class="rank-cell">${medal||rank}</td>
      <td class="player-cell">${esc(p.name)}</td>
      <td class="points-cell">${p.points}</td>
      <td>${p.daysPlayed}</td>
      <td>${scoreBadge(p.bestScore)}</td>
      <td><div class="win-bar"><span>${p.winPct}%</span>
        <div class="win-bar-bg"><div class="win-bar-fill" style="width:${p.winPct}%"></div></div>
      </div></td>
    </tr>`;
  }).join('');
}

function scoreBadge(s) {
  const cls = s===10?'sb-10':s===9?'sb-9':s>=8?'sb-8':s>=7?'sb-7':'sb-lo';
  return `<span class="score-badge ${cls}">${s}/10</span>`;
}

/* ── RENDER HISTORY TABLE ────────────────────────────────────────────────── */
function renderMonthHistory(mk, dates) {
  const players = getMonthPlayers(mk);

  document.getElementById('history-head').innerHTML =
    '<tr><th style="cursor:default">Date</th>' +
    players.map(p => `<th style="cursor:default">${esc(p)}</th>`).join('') +
    '<th style="cursor:default">Vainqueur(s)</th></tr>';

  document.getElementById('history-body').innerHTML = dates.map(date => {
    const scoreOf = {};
    for (const e of byDate[date]) scoreOf[e.player] = e.score;
    const winners = dayWinners[date];
    const cells = players.map(p => {
      if (scoreOf[p] == null) return `<td class="hscore"></td>`;
      return `<td class="hscore${winners.includes(p)?' winner':''}">${scoreOf[p]}/10</td>`;
    }).join('');
    return `<tr>
      <td class="date-col">${formatDate(date)}</td>
      ${cells}
      <td class="winner-col">${winners.map(esc).join(', ')}</td>
    </tr>`;
  }).join('');
}

/* ── RENDER ARCHIVES ─────────────────────────────────────────────────────── */
function renderArchives() {
  const past = availMonths.slice(0, -1); // all except last (current)
  const section = document.getElementById('archives-section');
  if (!past.length) { section.style.display = 'none'; return; }

  const MONTHS = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const ARC_MEDALS = ['🥇','🥈','🥉'];

  document.getElementById('archives-grid').innerHTML = [...past].reverse().map((mk, i) => {
    const [m, y] = mk.split('/');
    const ranking = getMonthRanking(mk);
    const rankMap = buildRankMap(ranking);
    const sorted  = [...ranking].sort((a,b) => b.points-a.points || a.name.localeCompare(b.name,'fr'));
    const top3    = sorted.filter(p => rankMap[p.name] <= 3).slice(0, 3);
    const idx     = availMonths.indexOf(mk);

    return `<div class="archive-card" data-idx="${idx}">
      <div class="archive-month">${MONTHS[parseInt(m)-1]} ${y}</div>
      <div class="archive-podium">
        ${top3.map((p, ri) => `<div class="archive-row">
          <span class="arc-medal">${ARC_MEDALS[rankMap[p.name]-1]||''}</span>
          <span class="arc-name">${esc(p.name)}</span>
          <span class="arc-pts">${p.points}pt</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  section.style.display = 'block';

  section.querySelectorAll('.archive-card').forEach(card => {
    card.addEventListener('click', () => {
      curMonthIdx = parseInt(card.dataset.idx);
      renderCurrentMonth();
      document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' });
    });
  });
}

/* ── NAVIGATION ──────────────────────────────────────────────────────────── */
document.getElementById('prev-month-btn').addEventListener('click', () => {
  if (curMonthIdx > 0) { curMonthIdx--; renderCurrentMonth(); }
});
document.getElementById('next-month-btn').addEventListener('click', () => {
  if (curMonthIdx < availMonths.length - 1) { curMonthIdx++; renderCurrentMonth(); }
});

/* ── SORT ────────────────────────────────────────────────────────────────── */
document.querySelectorAll('#ranking-table thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = (col === 'name' || col === 'rank') ? 1 : -1; }
    renderMonthRanking(getMonthRanking(availMonths[curMonthIdx]));
  });
});

/* ── TABS ────────────────────────────────────────────────────────────────── */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === tab+'-pane'));
  });
});

/* ── FILE PROCESSING ─────────────────────────────────────────────────────── */
function processFile(file) {
  const reader = new FileReader();
  reader.onload = async e => {
    const newEntries = parseWhatsApp(e.target.result);
    if (!newEntries.length) {
      showError('Aucune partie trouvée. Vérifiez que le fichier est bien un export WhatsApp contenant des scores "La Table des Savoirs".');
      return;
    }
    const stored = await loadEntries();
    await buildRanking([...stored, ...newEntries]);
    hideMsg();
    const total = Object.values(byDate).reduce((s, d) => s + d.length, 0);
    const added = total - stored.length;
    showInfo(added > 0
      ? `✓ ${added} nouvelle(s) partie(s) ajoutée(s) · ${total} au total`
      : `✓ Fichier traité — aucune nouvelle partie (${total} au total)`);
  };
  reader.onerror = () => showError('Impossible de lire le fichier.');
  reader.readAsText(file, 'UTF-8');
}

async function clearData() {
  if (!confirm('Effacer toutes les données sauvegardées ?')) return;
  await saveEntries([]);
  localStorage.removeItem(STORAGE_KEY);
  byDate = {}; dayWinners = {}; availMonths = []; curMonthIdx = 0;
  document.getElementById('main-content').style.display = 'none';
  document.getElementById('archives-section').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
  closeModal();
}

/* ── UI HELPERS ──────────────────────────────────────────────────────────── */
function showMainContent() {
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
}

function showError(msg) {
  const el = document.getElementById('error-msg'); el.textContent = msg; el.style.display = 'block';
  document.getElementById('info-msg').style.display = 'none';
}
function showInfo(msg) {
  const el = document.getElementById('info-msg'); el.textContent = msg; el.style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}
function hideMsg() {
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('info-msg').style.display  = 'none';
}

/* ── UTILS ───────────────────────────────────────────────────────────────── */
function dateToInt(s) { const [d,m,y] = s.split('/'); return parseInt(y+m+d,10); }
const MONTHS_FR = ['jan.','fév.','mar.','avr.','mai','juin','juil.','août','sep.','oct.','nov.','déc.'];
function formatDate(s) { const [d,m,y] = s.split('/'); return `${parseInt(d,10)} ${MONTHS_FR[parseInt(m,10)-1]} ${y}`; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── INIT ────────────────────────────────────────────────────────────────── */
(async function init() {
  const stored = await loadEntries();
  if (stored.length) {
    await buildRanking(stored);
  } else {
    document.getElementById('empty-state').style.display = 'flex';
  }
})();
</script>
